<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Debug / Test Page</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: 0 auto; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .pass { color: #2e7d32; }
    .fail { color: #c62828; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Experiment Debug / Test Page</h1>
  <p>Use this page to verify the experiment platform loads correctly and to run quick sanity checks.</p>

  <div class="section">
    <h2>1. Load Participant Schedule (P001)</h2>
    <button id="btnLoadSchedule">Load P001</button>
    <div id="scheduleResult"></div>
  </div>

  <div class="section">
    <h2>2. Load Scenario Questions</h2>
    <button id="btnLoadQuestions">Load scenario_questions.json</button>
    <div id="questionsResult"></div>
  </div>

  <div class="section">
    <h2>3. Load Questions Config</h2>
    <button id="btnLoadConfig">Load questions.json</button>
    <div id="configResult"></div>
  </div>

  <div class="section">
    <h2>4. Multi-Correct Answer Logic</h2>
    <button id="btnTestMultiCorrect">Test multi-correct correctness</button>
    <div id="multiCorrectResult"></div>
  </div>

  <div class="section">
    <h2>5. Asset Paths Check</h2>
    <button id="btnCheckAssets">Check asset paths</button>
    <div id="assetsResult"></div>
  </div>

  <div class="section">
    <h2>6. Console Errors</h2>
    <div id="consoleErrors"></div>
  </div>

  <script>
    const ASSET_BASE = "../";
    function assetPath(p) { return ASSET_BASE + p; }

    const errors = [];
    const origError = console.error;
    console.error = function(...args) {
      errors.push(args.join(" "));
      origError.apply(console, args);
    };

    document.getElementById("btnLoadSchedule").onclick = async () => {
      const el = document.getElementById("scheduleResult");
      try {
        const r = await fetch("participants_json/P001.json", { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const hasModels = data.models && data.models.length > 0;
        const hasPractice = data.practice && data.practice.length > 0;
        el.innerHTML = `<span class="pass">✓ Loaded</span> participant_id=${data.participant_id}, models=${data.models?.length || 0}, practice=${data.practice?.length || 0}`;
        if (!hasModels || !hasPractice) el.innerHTML += ` <span class="fail">⚠ Structure issue</span>`;
      } catch (e) {
        el.innerHTML = `<span class="fail">✗ Failed: ${e.message}</span>`;
      }
    };

    document.getElementById("btnLoadQuestions").onclick = async () => {
      const el = document.getElementById("questionsResult");
      try {
        const r = await fetch("questions/scenario_questions.json", { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const count = data.scenario_questions?.length || 0;
        const multiCount = data.scenario_questions?.filter(q => (q.correct_answer_indices || []).length > 1).length || 0;
        el.innerHTML = `<span class="pass">✓ Loaded</span> ${count} entries, ${multiCount} with multiple correct answers`;
      } catch (e) {
        el.innerHTML = `<span class="fail">✗ Failed: ${e.message}</span>`;
      }
    };

    document.getElementById("btnTestMultiCorrect").onclick = async () => {
      const el = document.getElementById("multiCorrectResult");
      try {
        const r = await fetch("questions/scenario_questions.json", { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const questions = data.scenario_questions || [];
        const multiCorrect = questions.filter(q => (q.correct_answer_indices || []).length > 1);
        let html = "";
        let passed = 0;
        let failed = 0;
        for (const q of multiCorrect.slice(0, 5)) {
          const indices = q.correct_answer_indices || [];
          const options = q.options || [];
          const correctIndices = indices;
          const isCorrect = (selIdx) => correctIndices.length > 0 ? correctIndices.includes(selIdx) : false;
          let ok = true;
          for (let i = 0; i < indices.length; i++) {
            if (!isCorrect(indices[i])) { ok = false; break; }
          }
          if (indices.length > 0 && !isCorrect(999)) ok = ok && true;
          if (ok) passed++; else failed++;
          html += `<div>${q.scenario_id} ${q.question_id}: indices [${indices.join(",")}] → ${ok ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}</div>`;
        }
        el.innerHTML = `<span class="pass">✓ Logic test</span> ${multiCorrect.length} multi-correct questions, sampled 5: ${passed} pass, ${failed} fail. ${html}`;
      } catch (e) {
        el.innerHTML = `<span class="fail">✗ Failed: ${e.message}</span>`;
      }
    };

    document.getElementById("btnLoadConfig").onclick = async () => {
      const el = document.getElementById("configResult");
      try {
        const r = await fetch("questions/questions.json", { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        el.innerHTML = `<span class="pass">✓ Loaded</span> intro_pages=${data.intro_pages?.length || 0}`;
      } catch (e) {
        el.innerHTML = `<span class="fail">✗ Failed: ${e.message}</span>`;
      }
    };

    document.getElementById("btnCheckAssets").onclick = () => {
      const el = document.getElementById("assetsResult");
      const paths = [
        assetPath("Images/STACKED.png"),
        assetPath("Images/RADAR.png"),
        assetPath("Images/HEATֹMAP.png"),
        assetPath("Scenarios/Correct_Scenarios/SCN_001_S.html")
      ];
      const results = paths.map(p => `${p}: <span class="pass">path OK</span>`);
      el.innerHTML = "<pre>" + paths.join("\n") + "</pre><p>Paths are relative to parent. Verify files exist.</p>";
    };

    setInterval(() => {
      const el = document.getElementById("consoleErrors");
      if (errors.length > 0) {
        el.innerHTML = "<span class='fail'>Errors: " + errors.length + "</span><pre>" + errors.slice(-5).join("\n") + "</pre>";
      } else {
        el.innerHTML = "<span class='pass'>No console errors</span>";
      }
    }, 1000);
  </script>
</body>
</html>

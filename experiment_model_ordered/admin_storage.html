<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Storage Admin (Model-Ordered)</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
    .container { max-width: 1400px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; color: #1976d2; border-bottom: 3px solid #1976d2; padding-bottom: 10px; }
    h2 { margin-top: 30px; color: #333; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }
    button { padding: 10px 20px; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #1976d2; color: #fff; transition: background 0.2s; }
    button:hover:not(:disabled) { background: #1565c0; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    button.danger { background: #c62828; }
    button.danger:hover { background: #b71c1c; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; background: white; }
    th { background: #f5f5f5; padding: 10px 8px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #ddd; }
    td { padding: 8px 8px; border-bottom: 1px solid #e0e0e0; }
    tr:hover { background: #f9f9f9; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .no-data { text-align: center; padding: 40px; color: #999; font-style: italic; }
    .refresh-row { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Experiment Storage Admin (Model-Ordered)</h1>
    <p>Manage participant data stored in browser localStorage. Data is saved automatically during the experiment.</p>
    <div class="refresh-row">
      <button id="refreshBtn">Refresh List</button>
      <button id="clearAllBtn" class="danger">Clear All</button>
    </div>
    <h2>Stored Sessions</h2>
    <div id="results"></div>
  </div>

  <script>
    const STORAGE_KEY_PREFIX = "experiment_model_ordered_log_";

    function refreshList() {
      const results = document.getElementById("results");
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(STORAGE_KEY_PREFIX)) {
          keys.push(key);
        }
      }

      if (keys.length === 0) {
        results.innerHTML = '<div class="no-data">No stored sessions found.</div>';
        return;
      }

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Participant ID</th>
            <th>Saved At</th>
            <th>Trials</th>
            <th>Questionnaires</th>
            <th>Stage</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      const tbody = table.querySelector("tbody");

      keys.forEach(key => {
        let participantId = "";
        let savedAt = "";
        let trials = 0;
        let questionnaires = 0;
        let stage = "";
        try {
          const raw = localStorage.getItem(key);
          const data = JSON.parse(raw || "{}");
          participantId = data.participantId || key.replace(STORAGE_KEY_PREFIX, "") || "?";
          savedAt = data.savedAt ? new Date(data.savedAt).toLocaleString() : "-";
          const logs = data.logs || {};
          trials = (logs.trials || []).length;
          questionnaires = (logs.questionnaires || []).length;
          stage = data.stage || "-";
        } catch (e) {
          participantId = key.replace(STORAGE_KEY_PREFIX, "");
        }

        const tr = document.createElement("tr");
        const downloadBtn = document.createElement("button");
        downloadBtn.textContent = "Download JSON";
        downloadBtn.onclick = () => {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          const blob = new Blob([raw], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${participantId}_log.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        };
        const clearBtn = document.createElement("button");
        clearBtn.textContent = "Clear";
        clearBtn.className = "danger";
        clearBtn.onclick = () => {
          if (confirm(`Clear stored data for ${participantId}?`)) {
            localStorage.removeItem(key);
            refreshList();
          }
        };
        const actionsDiv = document.createElement("div");
        actionsDiv.className = "actions";
        actionsDiv.appendChild(downloadBtn);
        actionsDiv.appendChild(clearBtn);
        tr.innerHTML = `
          <td>${participantId}</td>
          <td>${savedAt}</td>
          <td>${trials}</td>
          <td>${questionnaires}</td>
          <td>${stage}</td>
          <td></td>
        `;
        tr.querySelector("td:last-child").appendChild(actionsDiv);
        tbody.appendChild(tr);
      });

      results.innerHTML = "";
      results.appendChild(table);
    }

    document.getElementById("refreshBtn").onclick = refreshList;
    document.getElementById("clearAllBtn").onclick = () => {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(STORAGE_KEY_PREFIX)) keys.push(key);
      }
      if (keys.length === 0) {
        alert("No stored sessions to clear.");
        return;
      }
      if (confirm(`Clear all ${keys.length} stored session(s)?`)) {
        keys.forEach(k => localStorage.removeItem(k));
        refreshList();
      }
    };

    refreshList();
  </script>
</body>
</html>
